name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run typecheck

  ios:
    name: iOS build + simulator screenshot
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Pick a simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available --json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          devices = [d for runtime, devs in data['devices'].items() if 'iOS' in runtime for d in devs if d['name'].startswith('iPhone')]
          devices.sort(key=lambda d: d['name'], reverse=True)
          print(devices[0]['udid'] if devices else '')")
          if [ -z "$UDID" ]; then
            echo "No iPhone simulator available"; xcrun simctl list devices; exit 1
          fi
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          xcrun simctl list devices available | grep iPhone

      - name: Build app + widget extension
        run: |
          set -o pipefail
          xcodebuild build \
            -project Spendrift.xcodeproj \
            -scheme Spendrift \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

      - name: Launch in simulator and capture screenshot
        run: |
          UDID="${{ steps.sim.outputs.udid }}"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
          xcrun simctl install "$UDID" build/Build/Products/Debug-iphonesimulator/Spendrift.app
          xcrun simctl launch "$UDID" com.spendrift.app
          sleep 15
          mkdir -p screenshots
          xcrun simctl io "$UDID" screenshot screenshots/01-launch.png

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simulator-screenshots
          path: screenshots/
          if-no-files-found: ignore
